name: EAS build & submit

# Manually triggered once EAS is configured (P8/P9).
# Required GitHub Secrets: EXPO_TOKEN, EXPO_PUBLIC_SUPABASE_URL,
#   EXPO_PUBLIC_SUPABASE_ANON_KEY, EXPO_PUBLIC_SENTRY_DSN,
#   SENTRY_AUTH_TOKEN, SENTRY_ORG, SENTRY_PROJECT.
# For iOS submit: ASC_APP_ID, ASC_API_KEY_ID, ASC_API_KEY_ISSUER_ID,
#   ASC_API_KEY (base-64 encoded .p8).
# For Android submit: GOOGLE_SERVICE_ACCOUNT_KEY_JSON.

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Target platform
        required: true
        default: all
        type: choice
        options:
          - all
          - ios
          - android
      profile:
        description: EAS build profile
        required: true
        default: preview
        type: choice
        options:
          - preview
          - production
      submit:
        description: Submit to store after build?
        required: false
        default: false
        type: boolean

jobs:
  eas-build:
    name: EAS build (${{ inputs.platform }} / ${{ inputs.profile }})
    runs-on: ubuntu-latest
    environment: production
    env:
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
      EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Set up EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build
        working-directory: apps/mobile
        run: |
          eas build \
            --platform ${{ inputs.platform }} \
            --profile ${{ inputs.profile }} \
            --non-interactive \
            --no-wait

      - name: Submit
        if: ${{ inputs.submit == 'true' }}
        working-directory: apps/mobile
        run: |
          eas submit \
            --platform ${{ inputs.platform }} \
            --non-interactive \
            --latest
