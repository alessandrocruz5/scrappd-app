version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: scrappd-postgres
    environment:
      POSTGRES_DB: scrappd
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d scrappd"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - scrappd-network

  # ML Service (Background Removal)
  scrappd-ml-service:
    build:
      context: ./scrappd-ml-service
      dockerfile: Dockerfile
    container_name: scrappd-ml
    ports:
      - "8000:8000"
    environment:
      - SERVICE_NAME=Scrappd ML Service
      - MODEL_NAME=birefnet-general
      - DEBUG=false
    volumes:
      - ./scrappd-ml-service:/app
    networks:
      - scrappd-network

  # pgAdmin (Optional - Database GUI)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: scrappd-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@scrappd.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - scrappd-network
    profiles:
      - tools

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  scrappd-network:
    driver: bridge
