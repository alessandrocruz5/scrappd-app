# Local Docker services for Scrappd.
#
# The Go backend and its bespoke Postgres/Redis/pgAdmin stack are retired —
# auth, data, and storage now live in Supabase. Run the local Supabase stack
# with `pnpm db:start` (the Supabase CLI manages its own Docker containers);
# this file does NOT duplicate them.
#
# The only service here is the DORMANT Python ML background-removal service
# (BiRefNet), kept for the future premium tier and invoked later via the
# `remove-background` Supabase Edge Function. It is not part of the default
# flow, so it lives behind the `ml` profile and does not start by default.
#
#   docker compose --profile ml up        # start the dormant ML service
#   pnpm db:start                          # start Supabase (separate)

services:
  ml-service:
    build:
      context: ./apps/ml-service
      dockerfile: Dockerfile
    container_name: scrappd-ml
    ports:
      - "8000:8000"
    environment:
      - SERVICE_NAME=Scrappd ML Service
      - MODEL_NAME=birefnet-general
      - DEBUG=false
    profiles:
      - ml
