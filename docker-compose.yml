version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: scrappd-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-scrappd}
      POSTGRES_USER: ${POSTGRES_USER:-scrappd}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scrappd_dev_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - scrappd-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scrappd"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: scrappd-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-scrappd_redis_password}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - scrappd-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Go API Service
  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
      target: development
    container_name: scrappd-api
    environment:
      - ENV=development
      - PORT=8080
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER:-scrappd}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-scrappd_dev_password}
      - DB_NAME=${POSTGRES_DB:-scrappd}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-scrappd_redis_password}
      - JWT_SECRET=${JWT_SECRET:-your-jwt-secret-change-in-production}
      - ML_SERVICE_URL=http://ml-service:8000
      - CLOUDFLARE_ACCOUNT_ID=${CLOUDFLARE_ACCOUNT_ID}
      - CLOUDFLARE_ACCESS_KEY_ID=${CLOUDFLARE_ACCESS_KEY_ID}
      - CLOUDFLARE_SECRET_ACCESS_KEY=${CLOUDFLARE_SECRET_ACCESS_KEY}
      - CLOUDFLARE_R2_BUCKET=${CLOUDFLARE_R2_BUCKET:-scrappd-storage}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
    ports:
      - "${API_PORT:-8080}:8080"
    volumes:
      - ./services/api:/app
      - api_cache:/go/pkg/mod
    networks:
      - scrappd-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: air -c .air.toml

  # Python ML Service
  ml-service:
    build:
      context: ./services/ml-service
      dockerfile: Dockerfile
      target: development
    container_name: scrappd-ml
    environment:
      - ENV=development
      - PORT=8000
      - MODEL_PATH=/app/models
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-scrappd_redis_password}
    ports:
      - "${ML_PORT:-8000}:8000"
    volumes:
      - ./services/ml-service:/app
      - ml_models:/app/models
    networks:
      - scrappd-network
    depends_on:
      redis:
        condition: service_healthy
    # GPU support (uncomment if you have NVIDIA GPU)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # pgAdmin for database management (optional)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: scrappd-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@scrappd.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - scrappd-network
    depends_on:
      - postgres
    profiles:
      - tools

  # Redis Commander for Redis management (optional)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: scrappd-redis-commander
    environment:
      - REDIS_HOSTS=local:redis:6379:0:${REDIS_PASSWORD:-scrappd_redis_password}
    ports:
      - "${REDIS_COMMANDER_PORT:-8081}:8081"
    networks:
      - scrappd-network
    depends_on:
      - redis
    profiles:
      - tools

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  api_cache:
    driver: local
  ml_models:
    driver: local
  pgadmin_data:
    driver: local

networks:
  scrappd-network:
    driver: bridge