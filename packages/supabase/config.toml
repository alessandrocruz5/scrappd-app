# For detailed configuration reference documentation, visit:
# https://supabase.com/docs/guides/local-development/cli/config
project_id = "scrappd"

[api]
enabled = true
# Port to use for the API URL.
port = 54321
# Schemas to expose in your API. Tables, views and stored procedures in this
# schema will get API endpoints. `public` and `graphql_public` schemas are
# included by default. "content" holds the Books/Pages/Items domain tables.
schemas = ["public", "graphql_public", "content"]
# Extra schemas to add to the search_path of every request.
extra_search_path = ["public", "extensions"]
# The maximum number of rows returns from a view, table, or stored procedure.
# Limits payload size for accidental or malicious requests.
max_rows = 1000

[db]
# Port to use for the local database URL.
port = 54322
# Port used by db diff command to initialize the shadow database.
shadow_port = 54320
# The database major version to use. This has to be the same as your remote
# database's. Run `SHOW server_version;` on the remote database to check.
major_version = 15

[db.pooler]
enabled = false
# Port to use for the local connection pooler.
port = 54329
# Specifies when a server connection can be reused by other clients.
pool_mode = "transaction"
# How many server connections to allow per user/database pair.
default_pool_size = 20
# Maximum number of client connections allowed.
max_client_conn = 100

[realtime]
enabled = true

[studio]
enabled = true
# Port to use for Supabase Studio.
port = 54323
# External URL of the API server that frontend connects to.
api_url = "http://127.0.0.1"

# Email testing server. Emails sent with the local dev setup are not actually
# sent - rather, they are monitored, and you can view the emails that would have
# been sent from the web interface.
[inbucket]
enabled = true
# Port to use for the email testing server web interface.
port = 54324

[storage]
enabled = true
# The maximum file size allowed (e.g. "5MB", "500KB").
file_size_limit = "50MiB"

[auth]
enabled = true
# The base URL of your website. Used as an allow-list for redirects and for
# constructing the links inside auth emails (confirmation, password reset).
#
# The value below is the LOCAL default (Expo web dev server). It also drives the
# links inside locally-sent (inbucket) auth emails.
#
# PRODUCTION (hosted project gujldqovvhjbctzelark): set this to the live web
# domain in the Supabase Dashboard -> Authentication -> URL Configuration once
# the web app is deployed (see P7), e.g.:
#   site_url = "https://scrappd.vercel.app"   # <-- replace with the real domain
site_url = "http://127.0.0.1:3000"
# Exact URLs (wildcards allowed) that auth may redirect to, and the deep-link
# targets permitted in confirmation / password-reset emails. Includes the
# localhost dev origins and the `scrappd://` native app scheme (e.g. the
# password-reset callback added in P4).
#
# PRODUCTION: also add the live web domain + its reset route in the dashboard,
# e.g. "https://scrappd.vercel.app" and "https://scrappd.vercel.app/reset".
additional_redirect_urls = [
  "http://127.0.0.1:3000",
  "http://127.0.0.1:3000/**",
  "https://127.0.0.1:3000",
  "https://127.0.0.1:3000/**",
  "scrappd://",
  "scrappd://**",
]
# How long tokens are valid for, in seconds. Defaults to 3600 (1 hour).
jwt_expiry = 3600
# If disabled, the refresh token will never expire.
enable_refresh_token_rotation = true
# Allows refresh tokens to be reused after expiry, up to the specified interval
# in seconds. Requires enable_refresh_token_rotation = true.
refresh_token_reuse_interval = 10
# Allow/disallow new user signups to your project.
enable_signup = true

[auth.email]
# Allow/disallow new user signups via email to your project.
enable_signup = true
# If enabled, a user will be required to confirm any email change on both the
# old, and new email addresses. If disabled, only the new email is required to
# confirm.
double_confirm_changes = true
# If enabled, users need to confirm their email address before signing in.
#
# DECISION: kept FALSE locally (the inbucket dev mailbox makes confirm links a
# chore), so sign-up signs the user straight in — see apps/mobile "Auth flow".
# In PRODUCTION this is ENABLED (= true) so a real, reachable email is required
# before first sign-in; this guards against junk/typo signups and depends on the
# SMTP provider below being configured. The app already handles both modes: when
# confirmations are on, sign-up shows a "check your email" notice instead of
# routing into the app. Set to true under Authentication -> Providers -> Email
# on the hosted project (or via `supabase config push` with the prod env).
enable_confirmations = false

# ----------------------------------------------------------------------------
# Transactional email (password reset, confirmation).
#
# LOCAL: left disabled — the local stack captures outgoing mail in inbucket
# (see [inbucket] above) so no real SMTP is needed for development.
#
# PRODUCTION: a real SMTP sender is REQUIRED, otherwise password-reset and
# confirmation emails silently never arrive. Wire a provider (e.g. Resend,
# SendGrid, Amazon SES) in the Supabase Dashboard -> Authentication -> Emails ->
# SMTP Settings, OR push this block with `supabase config push` after exporting:
#   SUPABASE_SMTP_HOST, SUPABASE_SMTP_PORT, SUPABASE_SMTP_USER,
#   SUPABASE_SMTP_PASS, SUPABASE_SMTP_ADMIN_EMAIL, SUPABASE_SMTP_SENDER_NAME
# Keep the password OUT of git — supply it via the environment only.
# [auth.email.smtp]
# enabled = true
# host = "env(SUPABASE_SMTP_HOST)"
# port = 587
# user = "env(SUPABASE_SMTP_USER)"
# pass = "env(SUPABASE_SMTP_PASS)"
# admin_email = "env(SUPABASE_SMTP_ADMIN_EMAIL)"
# sender_name = "env(SUPABASE_SMTP_SENDER_NAME)"

# Use an external OAuth provider. The full list of providers are:
# `apple`, `azure`, `bitbucket`, `discord`, `facebook`, `github`, `gitlab`,
# `google`, `keycloak`, `linkedin`, `notion`, `twitch`, `twitter`, `slack`,
# `spotify`, `workos`, `zoom`.
[auth.external.apple]
enabled = false
client_id = ""
secret = ""

[analytics]
enabled = false

# Configure one of the supported edge runtime providers below.
[edge_runtime]
enabled = true
# Configure the request idle timeout for edge functions.
policy = "oneshot"
inspector_port = 8083

# Dormant premium placeholder for AI background removal. The function checks the
# caller's subscription tier itself, but enforcing the JWT here rejects
# unauthenticated requests before the function body even runs.
[functions.remove-background]
enabled = true
verify_jwt = true
